<html lang="es">
<head>
<meta charset="UTF-8" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{background:#f3f4f6;font-family:Arial;padding:20px}
.container{max-width:1150px;margin:auto;background:white;padding:20px;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.08)}

input{width:85px;padding:4px;text-align:center}

.row{display:flex;gap:10px;flex-wrap:wrap}
/* ===== MODAL FLOTANTE ===== */

#overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.5);
  backdrop-filter: blur(4px);
  z-index:999;
}

#formCliente{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:1000;
}

#modalAbono{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:1000;
}

#modalPago{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:1000;
}

.modal-content{
  background:white;
  padding:25px;
  border-radius:18px;
  width:320px;
  max-width:90vw;
  box-shadow:0 20px 50px rgba(0,0,0,.2);
  animation: aparecer .2s ease;
}

@keyframes aparecer{
  from{
    transform:scale(.9);
    opacity:0;
  }
  to{
    transform:scale(1);
    opacity:1;
  }
}
</style>
</head>

<body>
<div class="container">

<h2>Cuentas por Cobrar — Registro Semanal</h2>
 
<div id="fechaSemana" class="small" style="margin-bottom:10px;font-weight:bold"></div>

<div class="row">
 <button onclick="abrirFormCliente()">➕ Registrar Cliente</button>

  <button onclick="cerrarSemana()">
  📅 Cerrar semana / iniciar nueva
  </button>

  <button onclick="abrirHistorial()">
  📖 Ver semanas anteriores
  </button>

  <button onclick="volverSemanaActual()">
  ⏪ Volver a semana actual
  </button>

  <button onclick="borrarHistorial()" style="background:#b91c1c">
  🗑️ Borrar historial
  </button>
  <button id="btnModoEdicion"
  onclick="toggleEdicionGlobal()"
  style="background:#111827">
✏️ Modo edición
</button>
<button onclick="generarResumenSemanal()" style="background:#059669">
📊 Descargar resumen semanal
<button onclick="descargarResumenPorDia()" style="background:#7c3aed">
📅 Descargar resumen por día
</button>
</button>

</div>

<button
  type="button"
  style="
  background:#dc2626;
  border:none;
  border-radius:6px;
  padding:2px 6px;
  font-size:10px;
  cursor:pointer;
"
  onclick="borrarTodo()"
>
🧨 Borrar TODO (reset total)
</button>

<p class="small">
Formato de fracciones aceptado:<br>
<b>1/2 — 1 1/2 — 3/4 — 2 1/4 — etc.</b>
</p>

<table id="tablaClientes">
<thead>
<tr>
  <th>Cliente</th>
  <th>Lunes</th>
  <th>Martes</th>
  <th>Miércoles</th>
  <th>Jueves</th>
  <th>Viernes</th>
  <th>Sábado</th>
  <th>Domingo</th>
  <th>Total repartido</th>
  <th>Cuenta total</th>
  <th>Saldo</th>
  <th>Registrar pago</th>
  <th>PDF</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>
<!-- ===== MODAL REGISTRAR PAGO ===== -->
<div id="modalPago" style="display:none">
  <div class="modal-content" id="contenidoPago"></div>
</div>

<!-- ===== FONDO OSCURO ===== -->
<div id="overlay" style="display:none"></div>

<!-- ===== MODAL REGISTRAR CLIENTE ===== -->
<div id="formCliente" style="display:none">
  <div class="modal-content">

    <h3>Registrar cliente</h3>

    <label>Nombre del cliente</label><br>
    <input id="nombreCliente" placeholder="Ej. Juan"><br><br>

    <label>Precio por barra</label><br>
    <input id="precioCliente" type="number" placeholder="Ej. 10"><br><br>

    <button type="button" onclick="guardarCliente()">Guardar cliente</button>
    <button type="button" onclick="cerrarForm()">Cancelar</button>

  </div>
</div>

<!-- ===== MODAL ABONO GENERAL ===== -->
<div id="modalAbono" style="display:none">
  <div class="modal-content">

    <h3>Abono general</h3>

    <input type="hidden" id="abonoClienteIndex">

    <label>Monto</label><br>
    <input id="abonoMonto" type="number" placeholder="Ej. 500"><br><br>

    <label>Fecha</label><br>
    <input id="abonoFecha" type="date"><br><br>

    <button onclick="guardarAbonoModal()">Guardar</button>
    <button onclick="cerrarModalAbono()">Cancelar</button>

  </div>
</div>

<script>
let clientes = [];
let historialSemanas = [];
let ultimoAbono = null;
let modoEdicion = false;

const diasNombre = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];

function normalizarClientes(){
  clientes.forEach(c => {
    if(!Array.isArray(c.abonosGenerales)){
  c.abonosGenerales = [];
}

    // Si no existen los días, los crea
    if(!c.dias || c.dias.length !== 7){
      c.dias = diasNombre.map(() => ({
        cantidad: "",
        subtotal: 0,
        pago: 0,
        saldoDia: 0,
        pagos: []
      }));
    }

    // Si existen días viejos, asegura que tengan pagos
    c.dias.forEach(d => {
      if(!Array.isArray(d.pagos)) d.pagos = [];
      if(typeof d.pago !== "number") d.pago = 0;
      if(typeof d.subtotal !== "number") d.subtotal = 0;
      if(typeof d.saldoDia !== "number") d.saldoDia = 0;
    });

  });
}

let semanaActivaTemporal = null;
let viendoHistorial = false;

/* cargar datos */
if(localStorage.getItem("clientesPan")){
  clientes = JSON.parse(localStorage.getItem("clientesPan"));
}

normalizarClientes();

if(localStorage.getItem("historialPan")){
  historialSemanas = JSON.parse(localStorage.getItem("historialPan"));
}

function guardarStorage(){
  localStorage.setItem("clientesPan", JSON.stringify(clientes));
  localStorage.setItem("historialPan", JSON.stringify(historialSemanas));
}



/*===== FECHA DE SEMANA ===== */
function obtenerSemanaActual(){
  const hoy = new Date();
  const dia = hoy.getDay(); // 0 domingo, 1 lunes...
  const diff = dia === 0 ? -6 : 1 - dia;

  const lunes = new Date(hoy);
  lunes.setDate(hoy.getDate() + diff);

  const domingo = new Date(lunes);
  domingo.setDate(lunes.getDate() + 6);

  const formato = f =>
    f.toLocaleDateString("es-MX", { day:"2-digit", month:"long", year:"numeric" });

  return ` Semana del ${formato(lunes)} al ${formato(domingo)}`;
}
function mostrarFechaSemana(texto){
  const el = document.getElementById("fechaSemana");
  if(el){
    el.textContent = texto;
  }
}

/* ====== ENCABEZADOS CON FECHA ====== */
function actualizarEncabezadosSemana(){
  const ths = document.querySelectorAll("#tablaClientes thead th");

  const hoy = new Date();
  const dia = hoy.getDay(); // 0 domingo
  const diff = dia === 0 ? -6 : 1 - dia;

  const lunes = new Date(hoy);
  lunes.setDate(hoy.getDate() + diff);

  diasNombre.forEach((nombre, i) => {
    const fecha = new Date(lunes);
    fecha.setDate(lunes.getDate() + i);

    const numeroDia = fecha.getDate();

    const th = ths[i + 1]; // Lunes empieza en th 1
    if(th){
      th.innerHTML = `
        ${nombre}<br>
        <span class="small">${numeroDia}</span>
      `;
    }
  });
}

/* fracción → número */
function convertirFraccion(texto){
  if(!texto) return 0;
  texto = texto.toString().trim();

  if(texto.includes(" ")){
    const partes = texto.split(" ");
    return Number(partes[0]) + convertirFraccion(partes[1]);
  }
  if(texto.includes("/")){
    const [n,d] = texto.split("/");
    return Number(n)/Number(d);
  }
  return Number(texto);
}

/* número → fracción visible */
function numeroAFraccion(n){
  if(n === 0) return "0";

  const precision = 24; // denominador base
  const entero = Math.floor(n);
  let fraccion = n - entero;

  if(fraccion === 0) return entero.toString();

  let numerador = Math.round(fraccion * precision);
  let denominador = precision;

  // simplificar fracción
  function mcd(a, b){
    return b === 0 ? a : mcd(b, a % b);
  }

  const divisor = mcd(numerador, denominador);
  numerador /= divisor;
  denominador /= divisor;

  if(entero === 0){
    return `${numerador}/${denominador}`;
  }

  return `${entero} ${numerador}/${denominador}`;
}

/* registrar cliente */


/* calcular totales */
function calcularTotales(cliente){
  cliente.totalRepartido = 0;
  cliente.totalCuenta = 0;
  cliente.saldoTotal = 0;

  let totalPagadoDias = 0;

  cliente.dias.forEach(d=>{
    const cantidad = convertirFraccion(d.cantidad);
    d.subtotal = cantidad * cliente.precio;

    cliente.totalRepartido += cantidad;
    cliente.totalCuenta += d.subtotal;

    totalPagadoDias += d.pago;

    d.saldoDia = d.subtotal - d.pago;
    cliente.saldoTotal += d.saldoDia;
  });

  // 🔹 SUMAR ABONOS GENERALES
let totalAbonoGeneral = 0;

cliente.abonosGenerales.forEach(a=>{
  totalAbonoGeneral += a.monto;
});

// Guardamos cuánto ha abonado en total
cliente.totalAbonado = totalAbonoGeneral;

// Calculamos saldo final real del cliente
cliente.saldoFinal = cliente.saldoTotal - totalAbonoGeneral;

// Evitar negativos
if(cliente.saldoFinal < 0){
  cliente.saldoFinal = 0;
}
// 🔹 Cuenta mostrada (consumo - pagos por día - abonos)
cliente.cuentaMostrada =
    cliente.totalCuenta
    - totalPagadoDias
    - totalAbonoGeneral;

if(cliente.cuentaMostrada < 0){
  cliente.cuentaMostrada = 0;
}
}

/* actualizar día */
function actualizarDia(i,d,val){
  clientes[i].dias[d].cantidad = val;
  guardarStorage();
  renderTabla();
}

/* abrir pago */
function abrirPago(i){
  const c = clientes[i];
  calcularTotales(c);

  let listaDias = "";

  c.dias.forEach((d, idx) => {
    if(d.saldoDia > 0){
      listaDias += `
        <label style="display:block;margin-bottom:4px">
          <input
            type="checkbox"
            class="diaPago"
            value="${idx}"
            onchange="actualizarTotalSeleccionado(${i})"
          >
          ${diasNombre[idx]} — Debe $${d.saldoDia.toFixed(2)}
        </label>
      `;
    }
  });

  document.getElementById("contenidoPago").innerHTML = `
    <div class="card">
      <h3>Registrar pago — ${c.nombre}</h3>

      <b>Selecciona los días a pagar:</b><br><br>
      ${listaDias || "<i>No hay días pendientes</i>"}

      <div
        id="totalSeleccionado"
        style="margin-top:10px;font-weight:bold;color:#2563eb"
      >
        Total seleccionado: $0.00
      </div>

      <br>
      <label>Monto a pagar</label><br>
      <input id="pagoTotal" type="number" placeholder="Ej. 500"><br><br>

      <label>Fecha del pago</label><br>
      <input id="fechaCobro" type="date"><br><br>

      <button onclick="guardarPagoSeleccionado(${i})">
        Guardar pago
      </button>

      <br><br>
      <button onclick="cerrarModalPago()">Cerrar</button>
    </div>
  `;

  document.getElementById("modalPago").style.display = "block";
  document.getElementById("overlay").style.display = "block";
}

function actualizarTotalSeleccionado(i){
  const c = clientes[i];
  let total = 0;

  const checks = document.querySelectorAll(".diaPago:checked");

  checks.forEach(chk => {
    const idx = Number(chk.value);
    total += c.dias[idx].saldoDia;
  });

  const el = document.getElementById("totalSeleccionado");
  if(el){
    el.textContent = `Total seleccionado: $${total.toFixed(2)}`;
  }
}

/* aplicar pago */
function guardarPago(i){
  const monto = Number(document.getElementById("pagoTotal").value);
  if(isNaN(monto)) return alert("Ingresa un monto válido");

  const c = clientes[i];
  let restante = monto;

  c.dias.forEach(d=>{
    if(restante<=0) return;

    const falta = d.subtotal - d.pago;

    if(falta>0){
      const aplicado = Math.min(falta, restante);
      d.pago += aplicado;
      restante -= aplicado;
    }
  });
  
  guardarStorage();
  renderTabla();
}
function guardarPagoSeleccionado(i){
  const monto = Number(document.getElementById("pagoTotal").value);
  const fecha = document.getElementById("fechaCobro").value;

  if(isNaN(monto) || monto <= 0){
    alert("Ingresa un monto válido");
    return;
  }

  if(!fecha){
    alert("Selecciona una fecha");
    return;
  }

  const c = clientes[i];
  let restante = monto;

  // 🔹 obtener días seleccionados
  const checks = document.querySelectorAll(".diaPago:checked");

  if(checks.length === 0){
    alert("Selecciona al menos un día");
    return;
  }

  checks.forEach(chk => {
    if(restante <= 0) return;

    const idx = Number(chk.value);
    const d = c.dias[idx];

    const falta = d.subtotal - d.pago;

    if(falta > 0){
      const aplicado = Math.min(falta, restante);

      d.pago += aplicado;
      d.saldoDia -= aplicado;

      // ✅ guardar fecha del pago en ese día
      d.pagos.push({
        monto: aplicado,
        fecha: fecha
      });

      restante -= aplicado;
    }
  });

  cerrarModalPago();
  guardarStorage();
  renderTabla();
}

/* cambiar precio */
function editarPrecio(i){
  const nuevo = parseFloat(prompt(
    "Nuevo precio para " + clientes[i].nombre,
    clientes[i].precio
  ));
  if(isNaN(nuevo)) return;

  clientes[i].precio = nuevo;
  guardarStorage();
  renderTabla();
}
function pagarAdeudo(i){

  const c = clientes[i];

  if(c.adeudoAcumulado <= 0){
    alert("Este cliente no tiene adeudo.");
    return;
  }

  const monto = Number(prompt(
    `Adeudo pendiente: $${c.adeudoAcumulado.toFixed(2)}\n\n¿Cuánto desea pagar?`
  ));

  if(isNaN(monto) || monto <= 0) return;

  c.adeudoAcumulado -= monto;

  if(c.adeudoAcumulado < 0){
    c.adeudoAcumulado = 0;
  }

  guardarStorage();
  renderTabla();

  alert("Adeudo actualizado correctamente ✔");
}
/* cerrar semana */
function cerrarSemana(){

  const confirmar = confirm(
    "¿Deseas cerrar la semana?\n\n" +
    "✔ Se guardará en historial\n" +
    "✔ No se borrarán los clientes\n" +
    "✔ Se limpiarán pedidos y pagos\n\n" +
    "Confirmar?"
  );

  if(!confirmar) return;

  const fecha = obtenerSemanaActual();

const copiaSemana = {
  fecha,
  clientes: JSON.parse(JSON.stringify(clientes))
};

historialSemanas.push(copiaSemana);

  clientes.forEach(c=>{

  // 🔹 recalcular totales antes de guardar adeudo
  calcularTotales(c);

  if(c.saldoTotal > 0){
    c.adeudoAcumulado += c.saldoTotal;
  }


   c.dias.forEach(d=>{
  d.cantidad = "";
  d.subtotal = 0;
  d.pago = 0;
  d.saldoDia = 0;
  d.pagos = []; // 👈 limpia historial de pagos
});
c.abonosGenerales = [];

    c.totalRepartido = 0;
    c.totalCuenta = 0;
    c.saldoTotal = 0;
  });

  guardarStorage();
  alert("Semana cerrada y guardada en historial ✔");
  renderTabla();
}

/* ====== MODO HISTORIAL EN TABLA ====== */

function calcularAdeudoAnterior(nombreCliente){

  const cliente = clientes.find(c => c.nombre === nombreCliente);

  if(!cliente) return 0;

  return cliente.adeudoAcumulado || 0;
}


function abrirHistorial(){

  if(historialSemanas.length === 0){
    alert("Aún no hay semanas guardadas");
    return;
  }

  let opciones = "Selecciona la semana a visualizar:\n\n";

  historialSemanas.forEach((s,idx)=>{
    opciones += `${idx+1} — ${s.fecha}\n`;
  });

  const sel = prompt(opciones);
  if(sel === null) return;

  const index = Number(sel)-1;

  if(isNaN(index) || !historialSemanas[index]){
    alert("Opción inválida");
    return;
  }

  // guardar copia de la semana actual
  semanaActivaTemporal = JSON.parse(JSON.stringify(clientes));

  // 👇 CARGAR la semana seleccionada
  clientes = JSON.parse(JSON.stringify(historialSemanas[index].clientes));

  viendoHistorial = true;

  mostrarFechaSemana(historialSemanas[index].fecha);

  renderTabla();

  alert("Estás viendo una semana del historial.\n\nPulsa “Volver a semana actual” para regresar.");
}

function borrarHistorial(){

  const confirmar = confirm(
    "⚠️ ATENCIÓN\n\n" +
    "Esto borrará TODAS las semanas guardadas\n" +
    "y limpiará pagos registrados.\n\n" +
    "❌ Esta acción NO se puede deshacer\n\n" +
    "¿Deseas continuar?"
  );

  if(!confirmar) return;

  // borrar historial
  historialSemanas = [];
  ultimoAbono = null;

  // 🧹 LIMPIAR PAGOS DE LA SEMANA ACTUAL
  clientes.forEach(c => {
    c.dias.forEach(d => {
      d.pago = 0;
      d.saldoDia = 0;
      d.pagos = [];
    });
  });

  localStorage.removeItem("historialPan");

  guardarStorage();
  renderTabla();

  alert("Historial y pagos limpiados correctamente ✔");
}

function volverSemanaActual(){

  if(!viendoHistorial){
    alert("Ya estás en la semana actual");
    return;
  }

  // 🔹 Restaurar la semana original
  clientes = JSON.parse(JSON.stringify(semanaActivaTemporal));

  viendoHistorial = false;
  semanaActivaTemporal = null;

  mostrarFechaSemana(obtenerSemanaActual());

  renderTabla();
  actualizarEncabezadosSemana();

  alert("Regresaste a la semana actual ✔");
}

/* render tabla */
function renderTabla(){
  const tbody = document.querySelector("#tablaClientes tbody");
  tbody.innerHTML = "";

// 👉 acumulador de barras por día (L a D)
  let totalPorDia = [0,0,0,0,0,0,0];

  clientes.forEach((c,i)=>{
c.dias.forEach(d => {
  if(!d.pagos){
    d.pagos = [];
  }
});
    calcularTotales(c);
    // sumar barras por día
    c.dias.forEach((d, idx) => {
      totalPorDia[idx] += convertirFraccion(d.cantidad);
    });
    const totalFraccion = numeroAFraccion(c.totalRepartido);

    const fila = document.createElement("tr");

    fila.innerHTML = `
      <td>
        <b>${c.nombre}</b><br>
        <span class="price">$${c.precio.toFixed(2)}</span><br>
        <button onclick="editarPrecio(${i})">Cambiar precio</button>
        ${modoEdicion ? `
  <br>
  <button onclick="eliminarCliente(${i})"
    style="
      background:#b91c1c;
      margin-top:4px;
      font-size:11px;
      padding:4px 6px;
    ">
    🗑 Eliminar cliente
  </button>
` : ""}

        ${(() => {
  const adeudo = calcularAdeudoAnterior(c.nombre);
  if(adeudo > 0){
    return `<button onclick="pagarAdeudo(${i})">💰 Pagar adeudo</button>`;
  }
  return "";
})()}
      </td>

      ${c.dias.map((d,idx)=>`
        <td>
          <input
            value="${d.cantidad}"
            placeholder="ej. 1/2"
            onchange="actualizarDia(${i},${idx},this.value)"
          >
          <div class="small">
  Sub: $${d.subtotal.toFixed(2)}<br>
  Pagó: <span class="green">$${d.pago.toFixed(2)}</span><br>
  ${modoEdicion && d.pagos && d.pagos.length > 0 ? 
  d.pagos.map((p, pagoIndex) => `
    <div style="font-size:11px;margin-top:2px">
      ${p.fecha} — $${p.monto.toFixed(2)}
      <button onclick="eliminarPagoDia(${i}, ${idx}, ${pagoIndex})"
        style="
          background:#dc2626;
          border:none;
          border-radius:6px;
          padding:1px 5px;
          font-size:10px;
          cursor:pointer;
          margin-left:4px;
        ">
        ✕
      </button>
    </div>
  `).join("")
: ""}

${modoEdicion ? 
  c.abonosGenerales
    .filter(a => {
      const partes = a.fecha.split("-");
const fechaObj = new Date(
  Number(partes[0]),       // año
  Number(partes[1]) - 1,   // mes (0-index)
  Number(partes[2])        // día
);
      const diaJS = fechaObj.getDay();
      const diaIndice = diaJS === 0 ? 6 : diaJS - 1;
      return diaIndice === idx;
    })
    .map((a, abIndex) => `
      <span style="color:#2563eb;font-weight:bold">
        ${a.fecha} — Abono $${a.monto.toFixed(2)}
        <button onclick="eliminarAbono(${i}, ${abIndex})"
          style="
            background:#dc2626;
            border:none;

function abrirFormCliente(){
  document.getElementById("formCliente").style.display = "block";
  document.getElementById("overlay").style.display = "block";
}

function cerrarForm(){
  document.getElementById("formCliente").style.display = "none";
  document.getElementById("overlay").style.display = "none";
}

function guardarCliente(){
  const nombre = document.getElementById("nombreCliente").value.trim();
  const precio = Number(document.getElementById("precioCliente").value);

  if(!nombre){
    alert("Ingresa el nombre del cliente");
    return;
  }

  if(isNaN(precio) || precio <= 0){
    alert("Ingresa un precio válido");
    return;
  }

  const cliente = {
    nombre,
    precio,
    adeudoAcumulado: 0,
    abonosGenerales: [],
    dias: diasNombre.map(()=>({
      cantidad:"",
      subtotal:0,
      pago:0,
      saldoDia:0,
      pagos:[]
    })),
    totalRepartido:0,
    totalCuenta:0,
    saldoTotal:0
  };

  clientes.push(cliente);
  guardarStorage();
  renderTabla();

  document.getElementById("nombreCliente").value = "";
  document.getElementById("precioCliente").value = "";
  cerrarForm();
}

function registrarAbonoGeneral(i){

  document.getElementById("abonoClienteIndex").value = i;

  document.getElementById("abonoMonto").value = "";
  document.getElementById("abonoFecha").value = "";

  document.getElementById("modalAbono").style.display = "block";
  document.getElementById("overlay").style.display = "block";
}

function cerrarModalAbono(){
  document.getElementById("modalAbono").style.display = "none";
  document.getElementById("overlay").style.display = "none";
}

function guardarAbonoModal(){

  const i = document.getElementById("abonoClienteIndex").value;
  const monto = Number(document.getElementById("abonoMonto").value);
  const fecha = document.getElementById("abonoFecha").value;

  if(isNaN(monto) || monto <= 0){
    alert("Monto inválido");
    return;
  }

  if(!fecha){
    alert("Fecha requerida");
    return;
  }

  clientes[i].abonosGenerales.push({
    monto: monto,
    fecha: fecha
  });

  guardarStorage();
  renderTabla();
  cerrarModalAbono();
}

function cerrarModalPago(){
  document.getElementById("modalPago").style.display = "none";

}

function eliminarAbono(clienteIndex, abonoIndex){

  const confirmar = confirm("¿Eliminar este abono?");

  if(!confirmar) return;

  clientes[clienteIndex].abonosGenerales.splice(abonoIndex, 1);

  guardarStorage();
  renderTabla();
}

function eliminarPagoDia(clienteIndex, diaIndex, pagoIndex){

  const confirmar = confirm("¿Eliminar este pago?");
  if(!confirmar) return;

  const dia = clientes[clienteIndex].dias[diaIndex];

  // restar el monto eliminado del total pagado
  const pagoEliminado = dia.pagos[pagoIndex].monto;
  dia.pago -= pagoEliminado;

  // eliminar del historial
  dia.pagos.splice(pagoIndex, 1);

  guardarStorage();
  renderTabla();
}

function descargarResumenPorDia(){

  });

  const diaIndex = Number(sel) - 1;

    alert("Opción inválida");
    return;
  }

  const { jsPDF } = window.jspdf;
